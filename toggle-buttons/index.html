<!doctype html>
<html lang="en">
  <head>
    <script src="my-app.js" type="module"></script>
    <script type="module">
      const myApp = document.querySelector("my-app");
      const toggleButtons = myApp.shadowRoot.querySelector("toggle-buttons");
      toggleButtons.addEventListener("change", (e) => {
        const { tagName, property, oldValue, value } = e.detail;
        alert(`${tagName} ${property} changed from ${oldValue} to ${value}.`);
      });
    </script>
  </head>
  <body>
    <my-app></my-app>
  </body>
</html>
